# Example conf for jemdoc-cvx.
#
# Equations are rendered server-side with KaTeX (see README.md). No
# client-side script tags are required: the KaTeX stylesheet is linked
# automatically into the page <head> by the [katexcss] block in the default
# conf when an equation is present in the source file.
#
# This file intentionally does not override [bodystart]; the default produces
# clean HTML5 output.
